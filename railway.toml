[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm ci && npm run build && cp -r dist/* ../backend/public/ && cd ../backend && bundle install"

[deploy]
startCommand = "cd backend && bundle exec rails db:migrate && bundle exec puma -C config/puma.rb"
healthcheckPath = "/up"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
